name: AI STACK Tests (lint + pytest)

on:
  push:
    branches: [ main, master, develop, "phase*" ]
  pull_request:
    branches: [ main, master, develop, "phase*" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_stack
          POSTGRES_USER: ai_stack
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U ai_stack
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test & core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pytest pytest-mock pytest-cov httpx "psycopg[binary]"
          # Install service requirements (the ones we actually test)
          pip install -q -r apps/agent-orchestrator/requirements.txt || true
          pip install -q -r apps/worker/requirements.txt || true
          pip install -q -r apps/gateway-api/requirements.txt || true
          pip install -q -r apps/x-twitter-bot/requirements.txt tweepy || true
          # Ensure psycopg etc. are there (some already pulled above)
          pip install -q "psycopg[binary]" apscheduler python-dotenv

      - name: Lint (ruff or basic)
        run: |
          pip install -q ruff
          ruff check apps/ tests/ --select E,F --ignore E501 || echo "Ruff warnings (non-blocking for skeleton)"
          # If project adopts black/ruff later this becomes strict

      - name: Run pytest (mocked core paths + contract tests)
        env:
          DATABASE_URL: postgresql://ai_stack:change-me@localhost:5432/ai_stack
          ORCHESTRATOR_URL: http://localhost:8001
          SCHEDULER_ENABLED: "false"
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -q --tb=short --cov=apps --cov-report=term-missing || python -m pytest tests/ -q --tb=short

      - name: Upload coverage (optional future)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            htmlcov/
          retention-days: 7
