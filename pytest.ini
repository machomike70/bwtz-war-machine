[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -ra 
    -q 
    --strict-markers 
    --tb=short
    -p no:warnings
pythonpath = .
markers =
    unit: fast unit tests with mocks (default)
    integration: tests that may hit real services or DB
    db: database helper tests
    api: endpoint / contract tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
